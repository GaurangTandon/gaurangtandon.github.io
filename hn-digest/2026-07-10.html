    <h1>HN Mindful Digest — July 10, 2026</h1>
    <p class="date">Friday, July 10, 2026</p>
  </header>
  <iframe class="digest" sandbox="allow-same-origin allow-popups allow-top-navigation-by-user-activation" srcdoc="&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;meta charset=&quot;utf-8&quot;&gt;&lt;base target=&quot;_blank&quot;&gt;&lt;style&gt;:root{color-scheme:light dark}body{margin:0;font:17px/1.7 -apple-system,BlinkMacSystemFont,&#x27;Segoe UI&#x27;,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;background:transparent}p{margin:0 0 .6rem}ul{margin:0 0 1.5rem;padding-left:1.1rem;list-style:none}li{position:relative;margin:.25rem 0;padding-left:1rem;font-size:.92rem;color:#555}li::before{content:&#x27;\2014&#x27;;position:absolute;left:0;color:#aaa}a{color:#1a5fb4}@media(prefers-color-scheme:dark){body{color:#e6e6e6}li{color:#a8a8a8}li::before{color:#555}a{color:#6ea8fe}}&lt;/style&gt;&lt;/head&gt;&lt;body&gt;&lt;p&gt;&lt;em&gt;A quieter Friday roundup: three items on the economics of emergency care, what parental screen time signals to teenagers, and an experiment in tuning video to the brain.&lt;/em&gt;&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;The structure of U.S. ambulance billing, not simple greed, drives high and unpredictable charges.&lt;/strong&gt; A &lt;a href=&quot;https://davidoks.blog/p/why-american-ambulance-rides-are&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;detailed essay&lt;/a&gt; argues that ambulance services function economically more like sellers of an &amp;quot;option on rescue&amp;quot; — most of their cost is standing ready around the clock — yet Medicare has paid them since 1965 as a per-ride fee, a mismatch that produces large surprise bills, including one traveler&amp;#x27;s roughly $12,900 charge for a six-mile inter-hospital transfer (&lt;a href=&quot;https://news.ycombinator.com/item?id=48853091&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;). Ground ambulances were also left out of the 2020 federal surprise-billing ban.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Several commenters note that most other wealthy countries avoid this by funding ambulances through taxes or membership schemes, or by treating EMS like fire and police services.&lt;/li&gt;
&lt;li&gt;Some found the finance &amp;quot;option&amp;quot; framing overworked, suggesting the simpler explanation is that Medicare and insurers underpay, shifting costs to everyone else; one added that patients can sometimes contest vague bills and that California has since restricted this practice.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A study links parents&amp;#x27; device use to weaker adolescent-caregiver attachment.&lt;/strong&gt; Researchers at Newport Healthcare and collaborators introduce a new self-report scale and report associations between how teenagers perceive their caregivers&amp;#x27; phone use and the strength of the attachment bond, published in &lt;a href=&quot;https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2026.1766665/full&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;Frontiers in Psychology&lt;/a&gt; (&lt;a href=&quot;https://news.ycombinator.com/item?id=48854247&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;). The framing centers on children&amp;#x27;s sense of being ignored in favor of a screen.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters raise methodological doubts, noting the findings rest on adolescent self-report and risk conflating correlation with causation.&lt;/li&gt;
&lt;li&gt;Others offer an alternative explanation: anxious or insecure parents may both use devices more and have anxious children, so the two could share a common cause rather than one driving the other.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;An EPFL project generates videos designed to maximally activate a chosen brain region.&lt;/strong&gt; The &lt;a href=&quot;https://nevo-project.epfl.ch/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;NEVO project&lt;/a&gt; presents AI-generated animations optimized to drive activity in specific visual areas of the brain, with demo clips on its site (&lt;a href=&quot;https://news.ycombinator.com/item?id=48856904&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;). The linked page offers little written detail beyond the demos themselves.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters connect the idea to the concept of &amp;quot;supernormal stimulus&amp;quot; and worry aloud about misuse, such as advertising or gambling content engineered for maximal engagement.&lt;/li&gt;
&lt;/ul&gt;&lt;/body&gt;&lt;/html&gt;"></iframe>
