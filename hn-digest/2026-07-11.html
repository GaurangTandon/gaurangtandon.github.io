    <h1>HN Mindful Digest — July 11, 2026</h1>
    <p class="date">Saturday, July 11, 2026</p>
  </header>
  <iframe class="digest" sandbox="allow-same-origin allow-popups allow-top-navigation-by-user-activation" srcdoc="&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;meta charset=&quot;utf-8&quot;&gt;&lt;base target=&quot;_blank&quot;&gt;&lt;style&gt;:root{color-scheme:light dark}body{margin:0;font:17px/1.7 -apple-system,BlinkMacSystemFont,&#x27;Segoe UI&#x27;,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;background:transparent}p{margin:0 0 .6rem}ul{margin:0 0 1.5rem;padding-left:1.1rem;list-style:none}li{position:relative;margin:.25rem 0;padding-left:1rem;font-size:.92rem;color:#555}li::before{content:&#x27;\2014&#x27;;position:absolute;left:0;color:#aaa}a{color:#1a5fb4}@media(prefers-color-scheme:dark){body{color:#e6e6e6}li{color:#a8a8a8}li::before{color:#555}a{color:#6ea8fe}}&lt;/style&gt;&lt;/head&gt;&lt;body&gt;&lt;p&gt;&lt;em&gt;Today&amp;#x27;s stories center on a major legal clash between Apple and OpenAI, alongside new chemistry research, the ongoing scraper problem for the open web, and several looks at how AI models are being tested, used, and retired.&lt;/em&gt;&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;Apple has filed a lawsuit against OpenAI alleging trade secret theft by former employees.&lt;/strong&gt; The complaint, filed in the Northern District of California, names former Apple VP of product design Tang Tan, former engineer Chang Liu, OpenAI, and io Products as defendants, alleging that Tan used insider knowledge in job interviews, directed candidates to bring Apple hardware parts to &amp;quot;show and tell&amp;quot; sessions, and that Liu exploited a security bug to download confidential engineering files. Apple says it raised the issue with OpenAI in February and received no response; details are in the &lt;a href=&quot;https://9to5mac.com/2026/07/10/apple-sues-openai-trade-secret-theft/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;9to5Mac report&lt;/a&gt; and the &lt;a href=&quot;https://news.ycombinator.com/item?id=48865019&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters reading the full complaint highlight allegations that OpenAI coached recruits to conceal their new jobs from Apple and that departing employees repeatedly emailed themselves confidential information, including supplier details.&lt;/li&gt;
&lt;li&gt;Several note the practical reality that both companies have effectively unlimited legal resources, so the case is likely to be long and hard-fought rather than quickly resolved.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;Chemists have shown direct experimental evidence that relativistic effects reshape triple bonds in heavy elements.&lt;/strong&gt; A Brown University team used photoelectron spectroscopy on cold bismuth-carbon molecules and found that instead of the textbook one sigma bond plus two pi bonds, the structure looks like one pi bond and two hybrid sigma-pi bonds, a consequence of spin-orbit coupling when electrons move at relativistic speeds. The &lt;a href=&quot;https://www.brown.edu/news/2026-07-09/chemical-bonds-relativity&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;Brown announcement&lt;/a&gt; and the &lt;a href=&quot;https://news.ycombinator.com/item?id=48866134&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt; have details, and the study appears in Science.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters point out that relativistic effects in heavy elements have been understood for decades — they explain gold&amp;#x27;s color, for example — so the news here is the direct spectroscopic confirmation, not the underlying idea.&lt;/li&gt;
&lt;li&gt;Some frame the result as one more experimental validation of Dirac&amp;#x27;s relativistic quantum mechanics.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;LWN reports that AI-driven scraping via residential proxies continues to grow.&lt;/strong&gt; The site describes coordinated request floods from millions of unique IP addresses, mostly on residential and mobile networks, routed through devices whose owners often don&amp;#x27;t know they are proxies — from malware-compromised media boxes to &amp;quot;free&amp;quot; VPN apps that resell users&amp;#x27; connections. Google&amp;#x27;s takedown of the IPIDEA bot network brought a temporary lull that has since ended, per the &lt;a href=&quot;https://lwn.net/SubscriberLink/1080822/990a8a5e2d379085/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;LWN article&lt;/a&gt; and the &lt;a href=&quot;https://news.ycombinator.com/item?id=48864252&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Several commenters worry that aggressive anti-scraping measures could damage the open web and concentrate gatekeeping power in companies like Cloudflare, suggesting a stronger Common Crawl as a shared alternative that reduces the incentive to scrape.&lt;/li&gt;
&lt;li&gt;Others describe a growing community that deliberately serves poisoned data to scrapers, distributing large volumes of it across websites, repositories, and social media.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A report examines how Boko Haram fighters say they use AI tools.&lt;/strong&gt; The &lt;a href=&quot;https://casp.ac/reports/ai-enabled-terrorism&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;CASP report&lt;/a&gt; is based on accounts from members of the terrorist group describing uses of large language models for information-gathering and planning, and it drew a skeptical reception in the &lt;a href=&quot;https://news.ycombinator.com/item?id=48863707&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters with experience of jailbroken models are skeptical of the more dramatic claims, noting that such outputs are rarely actionable beyond what Wikipedia already provides.&lt;/li&gt;
&lt;li&gt;Several find specific quoted anecdotes — like AI-guided motorcycle jump training and tactical unit-sizing advice — implausible, suggesting the interviewees may be overstating or misattributing what the tools did.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A benchmark site ran twelve models through the same four coding tasks.&lt;/strong&gt; TryAI had GPT-5.6&amp;#x27;s new Sol, Terra, and Luna tiers, Grok 4.5, Claude Opus 4.8 and Fable 5, Meta&amp;#x27;s Muse Spark 1.1, and four open-weights models each attempt a raycaster, a 3D Rubik&amp;#x27;s cube, a calculator, and Game of Life five times, publishing every attempt with cost and latency figures. Results varied by task — GPT-5.6 Sol led the raycaster while Claude Fable 5 was the only model to go five-for-five on the Rubik&amp;#x27;s cube — with all builds linked from the &lt;a href=&quot;https://www.tryai.dev/blog/gpt-5.6-build-off-12-models&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;writeup&lt;/a&gt; and the &lt;a href=&quot;https://news.ycombinator.com/item?id=48865093&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters note the tasks are all clones of well-known apps, which may reward memorized patterns rather than testing genuinely novel work.&lt;/li&gt;
&lt;li&gt;Some read GLM-5.2&amp;#x27;s zero-for-five showings as support for the view that certain open-weights models are tuned to benchmarks and perform worse in practice than their published numbers suggest.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;Users are petitioning Google not to retire Gemini 2.5 Flash.&lt;/strong&gt; A thread on Google&amp;#x27;s &lt;a href=&quot;https://discuss.ai.google.dev/t/please-dont-discontinue-gemini-2-5-flash/174246&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;AI developer forum&lt;/a&gt; asks the company to keep the model available, with users describing it as an unusually good balance of speed, cost, and capability for production workloads; the &lt;a href=&quot;https://news.ycombinator.com/item?id=48864507&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt; echoes that sentiment.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters frame this as a structural problem with cloud-hosted models: workflows built on a specific model can be broken by deprecation, with replacements that behave differently and often cost more — a risk local models don&amp;#x27;t carry.&lt;/li&gt;
&lt;li&gt;Some note a nearly identical plea was made when Gemini 2.0 Flash was retired, suggesting depending heavily on any single hosted model is a recurring trap.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;New York City has finalized a municipal &amp;quot;click-to-cancel&amp;quot; rule.&lt;/strong&gt; The city&amp;#x27;s Department of Consumer and Worker Protection announced a final rule requiring that subscriptions be as easy to cancel as they are to start, alongside a proposed rule mandating all-in pricing that bans hidden junk fees; the city estimates the cancellation rule alone could save residents up to $162.5 million per year. The announcement is on &lt;a href=&quot;https://www.nyc.gov/mayors-office/news/2026/07/mayor-mamdani-announces-landmark--click-to-cancel--consumer-prot&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;nyc.gov&lt;/a&gt;, with an &lt;a href=&quot;https://news.ycombinator.com/item?id=48864158&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;.&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;A photo collection revisits Soviet-era industrial control rooms.&lt;/strong&gt; The &lt;a href=&quot;https://designyoutrust.com/2018/01/vintage-beauty-soviet-control-rooms/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;2018 gallery&lt;/a&gt; shows pre-computer control rooms dense with physical buttons, dials, and analog displays, including the Chernobyl Reactor 4 control room; the &lt;a href=&quot;https://news.ycombinator.com/item?id=48868996&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt; adds useful context.&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters note the aesthetic isn&amp;#x27;t uniquely Soviet — Western control rooms of the same era, such as 1970s French nuclear plants, look much the same, since every input and output had to be a physical device.&lt;/li&gt;
&lt;li&gt;Someone with SCADA experience explains that early screen-based interfaces deliberately reproduced these physical panel layouts, because retraining operators on new layouts was costly and risky.&lt;/li&gt;
&lt;/ul&gt;&lt;/body&gt;&lt;/html&gt;"></iframe>
