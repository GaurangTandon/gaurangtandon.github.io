    <h1>HN Mindful Digest — July 20, 2026</h1>
    <p class="date">Monday, July 20, 2026</p>
  </header>
  <iframe class="digest" sandbox="allow-same-origin allow-popups allow-top-navigation-by-user-activation" srcdoc="&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;meta charset=&quot;utf-8&quot;&gt;&lt;base target=&quot;_blank&quot;&gt;&lt;style&gt;:root{color-scheme:light dark}body{margin:0;font:17px/1.7 -apple-system,BlinkMacSystemFont,&#x27;Segoe UI&#x27;,Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;background:transparent}p{margin:0 0 .6rem}ul{margin:0 0 1.5rem;padding-left:1.1rem;list-style:none}li{position:relative;margin:.25rem 0;padding-left:1rem;font-size:.92rem;color:#555}li::before{content:&#x27;\2014&#x27;;position:absolute;left:0;color:#aaa}a{color:#1a5fb4}@media(prefers-color-scheme:dark){body{color:#e6e6e6}li{color:#a8a8a8}li::before{color:#555}a{color:#6ea8fe}}&lt;/style&gt;&lt;/head&gt;&lt;body&gt;&lt;p&gt;&lt;em&gt;A quieter read through today&amp;#x27;s technology stories, from AI-assisted mathematics to the fine print on document formats and brain scans.&lt;/em&gt;&lt;/p&gt;

&lt;p&gt;&lt;strong&gt;A claimed counterexample to the Jacobian Conjecture was produced with help from an AI model.&lt;/strong&gt; A mathematician posted an explicit polynomial map from ℂ³ to ℂ³ with constant Jacobian determinant −2 that sends three distinct points to the same image, which would disprove the long-standing conjecture; the work was credited to a session with the &amp;quot;Fable&amp;quot; model (&lt;a href=&quot;https://xcancel.com/__alpoge__/status/2079028340955197566&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;post&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48973869&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters point out the appeal is that the object is small enough for humans to check directly, and several report independently verifying it with symbolic algebra tools.&lt;/li&gt;
&lt;li&gt;Several note this sits alongside other recent claims of AI-assisted results on open math problems rather than being an isolated event.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A study reports that access to AI advice lowered accuracy while raising confidence.&lt;/strong&gt; Researchers at French and Italian universities found willingness to answer &amp;quot;I don&amp;#x27;t know&amp;quot; fell from 44% to 3%, accuracy dropped from 27% to 9%, and confidence rose from 30% to 76%, using questions on which the chosen model typically fails; modest cash incentives only partly recovered performance (&lt;a href=&quot;https://thenextweb.com/news/ai-advice-suppresses-critical-thinking-wrong-answers-study&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;article&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48971738&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Some readers note the article&amp;#x27;s links do not trace back to the underlying paper, pointing instead to the outlet&amp;#x27;s own pages.&lt;/li&gt;
&lt;li&gt;Others ask whether the effect is specific to AI or would appear with any source that confidently returns wrong answers, such as a search that retrieves incorrect results.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;Xiaomi released a robot foundation model trained mostly on embodiment-free data.&lt;/strong&gt; Xiaomi-Robotics-1 pairs pre-training on roughly 100,000 hours of gripper-based UMI trajectories with a smaller stage of real-robot data, and the authors report success rates that rise predictably with more pre-training data and larger models, reaching 75–85% on new household tasks from a few hours of demonstrations each (&lt;a href=&quot;https://robotics.xiaomi.com/xiaomi-robotics-1.html&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;project page&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48974454&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters ask how well such models transfer to robot bodies they were not trained on, and how the approach compares to the world models being built by autonomous-driving groups.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A security researcher used an LLM to find a pre-auth WordPress remote-code-execution chain.&lt;/strong&gt; The write-up describes adapting a published prompt to run multiple agents over the WordPress source for several hours, producing a full exploit chain for around $25 in model costs, with a checker tool provided and disclosure timed to give defenders a window to upgrade (&lt;a href=&quot;https://slcyber.io/research-center/exploit-brokers-pay-500000-for-a-wordpress-rce-i-found-one-with-gpt5-6/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;article&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48975665&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Several question the headline&amp;#x27;s $500,000 framing, noting WordPress&amp;#x27;s reputation for weak security and doubting brokers still pay that much.&lt;/li&gt;
&lt;li&gt;Others ask whether the researchers actually collected any bounty and whether such bugs can still be sold through brokers.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A public leaderboard times how fast LoRA fine-tuning can hit a fixed accuracy target.&lt;/strong&gt; LoRA Speedrun freezes the task, model, and hardware — for example, fine-tuning Qwen2.5-1.5B to at least 57% on GSM8K on a single L40S — and ranks entries by wall-clock training time, with each record re-run three times on identical hardware before it counts (&lt;a href=&quot;https://github.com/Saivineeth147/lora-speedrun&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;repository&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48974325&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters worry a single task and model invites overfitting, and suggest more tasks would better show whether a technique generalizes.&lt;/li&gt;
&lt;li&gt;Some ask for hardware-normalized entries, since GPU differences can dominate raw timings.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;Moonshine is a new self-hosted game-streaming server for Moonlight clients.&lt;/strong&gt; The Rust project streams games from a Linux PC to any Moonlight client, running each session in its own isolated compositor so the host stays usable and no monitor is required, with GPU-based H.264/H.265/AV1 encoding, HDR, and full controller input (&lt;a href=&quot;https://github.com/hgaiser/moonshine&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;repository&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48972970&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Several ask how it differs from the established Sunshine server and its Apollo fork, noting that streaming from one&amp;#x27;s own PC has existed for years.&lt;/li&gt;
&lt;li&gt;The isolated-session design draws interest for headless machines, though the modern-GPU requirement is a limitation for some.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;Kagi&amp;#x27;s Orion browser is being promoted across desktop and mobile platforms.&lt;/strong&gt; Orion is a WebKit-based browser advertising zero telemetry, built-in ad-blocking, and support for a curated set of Safari, Chrome, and Firefox extensions, with a Linux beta and a Windows alpha now listed alongside its Mac and iOS versions (&lt;a href=&quot;https://orionbrowser.com/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;site&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48970894&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters flag that &amp;quot;WebKit&amp;quot; and &amp;quot;designed from the ground up&amp;quot; sit awkwardly together, and ask why a privacy-focused browser does not publish its source code.&lt;/li&gt;
&lt;li&gt;For several users the practical draw is Firefox extensions on iOS, enabling ad- and sponsor-blockers not otherwise available there.&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;&lt;strong&gt;A study links heavy television watching to smaller brain volume.&lt;/strong&gt; Published in &lt;em&gt;Alzheimer&amp;#x27;s &amp;amp; Dementia&lt;/em&gt;, the research found reduced volume in memory-related regions among heavy TV watchers while other sedentary activities showed no such association, suggesting what one does while sitting may matter more than sitting itself (&lt;a href=&quot;https://dornsife.usc.edu/news/stories/heavy-tv-watching-associated-with-smaller-brain-structures/&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;article&lt;/a&gt;, &lt;a href=&quot;https://news.ycombinator.com/item?id=48971418&quot; target=&quot;_blank&quot; rel=&quot;noopener noreferrer nofollow&quot;&gt;HN discussion&lt;/a&gt;).&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Commenters stress this is an observational study with a single MRI and self-reported activity, showing correlation rather than causation, and note the authors themselves make no causal claim.&lt;/li&gt;
&lt;/ul&gt;&lt;/body&gt;&lt;/html&gt;"></iframe>
